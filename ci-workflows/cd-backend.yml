name: CD Backend

on:
  push:
    branches: [main]
    paths: ['src/lib/**','prisma/**','scripts/**','package.json','Dockerfile']
  workflow_dispatch:
    inputs:
      environment: { description: 'Env', required: true, default: 'staging', type: choice, options: [staging, production] }

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: '${{ env.REGISTRY }}', username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}' }
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}'
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with: { context: ., push: true, tags: '${{ steps.meta.outputs.tags }}', labels: '${{ steps.meta.outputs.labels }}', cache-from: type=gha, cache-to: 'type=gha,mode=max' }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: '${{ github.event.inputs.environment || ''staging'' }}' }
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy ${{ github.sha }}"
      - uses: slackapi/slack-github-action@v1
        if: success()
        with: { payload: '{"text":"Backend deployed ${{ github.sha }}"}' }
        env: { SLACK_WEBHOOK_URL: '${{ secrets.SLACK_WEBHOOK_URL }}' }

# Apoffa AI Worker — persistent document processing worker
version: "3.8"

services:
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: apoffa-worker
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - WORKER_CONCURRENCY=2
      - WORKER_POLL_INTERVAL_MS=5000
      - HEALTH_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
